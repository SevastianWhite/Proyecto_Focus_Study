<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Study</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/inicio.css') }}">
</head>
<body>

  <!-- Video de fondo -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="{{ url_for('static', filename='video/inicio.mp4') }}" type="video/mp4">
  </video>

  <!-- Overlay sutil para mejorar contraste del texto -->
  <div class="video-overlay"></div>

  <!-- Navegación -->
  <nav class="navbar">
    <div class="nav-logo">
      <span class="nav-brand-text">Focus Study</span>
    </div>
    <div class="nav-acciones">
      <a href="{{ url_for('quienesomos') }}" class="nav-link-qs">¿Quiénes somos?</a>
      <a href="{{ url_for('login') }}" class="nav-btn-login">Login</a>
    </div>
  </nav>

  <!-- Hero -->
  <main class="hero">

    <!-- Logo FS principal centrado -->
    <div class="hero-logo-wrap">
      <img src="{{ url_for('static', filename='img/logo_hero.svg') }}" alt="Focus Study" class="hero-logo-img">
      <p class="hero-logo-nombre">Focus Study</p>
    </div>

    <p class="hero-eyebrow">Método · Enfoque · Resultado</p>
    <h1 class="hero-titulo">Estudia mejor.<br>Aprende mejor.</h1>
    <p class="hero-sub">La forma en cómo estudias lo cambia todo.</p>

    <div class="hero-methods">
      <span>Pomodoro</span>
      <span>Feynman</span>
      <span>Active Recall</span>
      <span>Cornell</span>
    </div>

  </main>

  <script>
    // Fade suave al hacer loop del video — evita el corte brusco
    var video = document.getElementById('bg-video');
    video.addEventListener('timeupdate', function () {
      if (!video.duration) return;
      var remaining = video.duration - video.currentTime;
      if (remaining < 0.9) {
        video.style.opacity = Math.max(0, remaining / 0.9);
      } else if (video.currentTime < 0.4) {
        video.style.opacity = video.currentTime / 0.4;
      } else {
        video.style.opacity = 1;
      }
    });
  </script>

</body>
</html>
