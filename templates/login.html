<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Study — Acceso</title>
    <style>
        /* ── Variables del proyecto ────────────────────────────── */
        :root {
            --fs-lavanda: #DCCFFB;
            --fs-morado:  #BDA7F5;
            --fs-blanco:  #FAFAFC;
            --fs-gris:    #ECECF3;
            --fs-borde:   #E0DCF0;
            --fs-texto:   #2F2F38;
            --fs-suave:   #8a7fa8;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background:
                linear-gradient(145deg, rgba(220,207,251,0.72) 0%, rgba(237,232,255,0.68) 100%),
                url("{{ url_for('static', filename='css/fotolog.jpg') }}") center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── Marca en la parte superior ───────────────────────── */
        .fs-brand {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--fs-texto);
            margin-bottom: 28px;
        }

        /* ── Contenedor del switch + card ─────────────────────── */
        .flip-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* El input hidden controla el flip con CSS puro */
        .flip-toggle { display: none; }

        /* ── Navegación tipo tab entre Login y Registro ──────── */
        .switch-nav {
            display: flex;
            align-items: center;
            gap: 28px;
            margin-bottom: 18px;
        }

        .switch-nav-label {
            font-size: 0.84rem;
            font-weight: 500;
            color: var(--fs-suave);
            cursor: pointer;
            user-select: none;
            padding-bottom: 6px;
            position: relative;
            transition: color 0.2s;
        }

        .switch-nav-label::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            border-radius: 2px;
            background: var(--fs-morado);
            transform: scaleX(0);
            transition: transform 0.25s ease;
        }

        /* Login activo por defecto (unchecked) */
        .switch-nav-label--login {
            color: var(--fs-texto);
            font-weight: 600;
        }
        .switch-nav-label--login::after { transform: scaleX(1); }

        /* Cuando está checked → Crear cuenta es el activo */
        .flip-toggle:checked ~ .flip-wrapper .switch-nav-label--login {
            color: var(--fs-suave);
            font-weight: 500;
        }
        .flip-toggle:checked ~ .flip-wrapper .switch-nav-label--login::after { transform: scaleX(0); }
        .flip-toggle:checked ~ .flip-wrapper .switch-nav-label--reg {
            color: var(--fs-texto);
            font-weight: 600;
        }
        .flip-toggle:checked ~ .flip-wrapper .switch-nav-label--reg::after { transform: scaleX(1); }

        /* ── Flip card ─────────────────────────────────────────── */
        .card-scene {
            width: 320px;
            height: 430px;
            perspective: 900px;
        }

        .flip-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.65s ease;
        }

        /* Girar cuando el toggle está activado */
        .flip-toggle:checked ~ .flip-wrapper .flip-card {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: var(--fs-blanco);
            border-radius: 18px;
            border: 1.5px solid var(--fs-borde);
            box-shadow: 0 6px 28px rgba(189, 167, 245, 0.16);
            padding: 32px 28px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* ── Contenido de cada cara ────────────────────────────── */
        .card-titulo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--fs-texto);
        }

        .card-sub {
            font-size: 0.78rem;
            color: var(--fs-suave);
            line-height: 1.5;
            margin-top: -6px;
        }

        /* ── Campos del formulario ─────────────────────────────── */
        .fs-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--fs-borde);
            border-radius: 9px;
            background: var(--fs-blanco);
            font-size: 0.84rem;
            color: var(--fs-texto);
            font-family: inherit;
            transition: border-color 0.15s;
        }

        .fs-input:focus {
            outline: none;
            border-color: var(--fs-morado);
        }

        .fs-input::placeholder { color: #c5bfd8; }

        .fs-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── Botón principal ───────────────────────────────────── */
        .fs-btn {
            width: 100%;
            padding: 12px;
            background: var(--fs-morado);
            color: #fff;
            border: none;
            border-radius: 9px;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 4px;
            transition: opacity 0.18s;
        }

        .fs-btn:hover { opacity: 0.85; }

        /* ── Mensajes de error ─────────────────────────────────── */
        .fs-error {
            font-size: 0.75rem;
            color: #9a5555;
            background: #fdf0f0;
            border-radius: 7px;
            padding: 8px 12px;
            line-height: 1.4;
        }

        .fs-err-inline {
            display: none;
            font-size: 0.73rem;
            color: #9a5555;
            padding: 2px 0;
        }

        /* ── Enlace volver ─────────────────────────────────────── */
        .fs-volver {
            font-size: 0.73rem;
            color: var(--fs-suave);
            text-decoration: none;
            text-align: center;
            margin-top: auto;
            display: block;
        }

        .fs-volver:hover { color: var(--fs-texto); }
    </style>
</head>
<body>

    <!-- El input oculto controla el flip mediante selectores CSS (~) -->
    <!-- Si Flask devuelve mostrar_registro=True (error en registro), empieza girado -->
    <input type="checkbox" id="flip-toggle" class="flip-toggle" autocomplete="off"
           {% if mostrar_registro %}checked{% endif %}>

    <p class="fs-brand">Focus Study</p>

    <div class="flip-wrapper">

        <!-- Navegación entre las dos caras -->
        <div class="switch-nav">
            <span class="switch-nav-label switch-nav-label--login"
                  onclick="document.getElementById('flip-toggle').checked=false">
                Iniciar sesión
            </span>

            <span class="switch-nav-label switch-nav-label--reg"
                  onclick="document.getElementById('flip-toggle').checked=true">
                Crear cuenta
            </span>
        </div>

        <!-- Flip card -->
        <div class="card-scene">
            <div class="flip-card">

                <!-- FRENTE: Login -->
                <div class="card-front">
                    <h1 class="card-titulo">Bienvenido</h1>
                    <p class="card-sub">Ingresa tus datos para continuar</p>

                    {% if error %}
                    <p class="fs-error">{{ error }}</p>
                    {% endif %}

                    <form class="fs-form" method="POST" action="{{ url_for('login') }}"
                          onsubmit="return validarLogin(this)">
                        <input class="fs-input" type="email" name="correo"
                               placeholder="Correo electrónico" required
                               value="{{ correo_previo or '' }}">
                        <input class="fs-input" type="password" name="contrasena"
                               placeholder="Contraseña" required>
                        <span id="err-login" class="fs-err-inline"></span>
                        <button class="fs-btn" type="submit">Entrar</button>
                    </form>

                    <a href="{{ url_for('inicio') }}" class="fs-volver">← Volver al inicio</a>
                </div>

                <!-- DORSO: Registro -->
                <div class="card-back">
                    <h1 class="card-titulo">Crear cuenta</h1>
                    <p class="card-sub">Es rápido, solo necesitas un correo</p>

                    {% if error_reg %}
                    <p class="fs-error">{{ error_reg }}</p>
                    {% endif %}

                    <form class="fs-form" method="POST" action="{{ url_for('registro') }}"
                          onsubmit="return validarRegistro(this)">
                        <input class="fs-input" type="text" name="nombre"
                               placeholder="Tu nombre" required maxlength="30">
                        <input class="fs-input" type="email" name="correo"
                               placeholder="Correo electrónico" required>
                        <input class="fs-input" type="password" name="contrasena"
                               placeholder="Contraseña (mínimo 8 caracteres)" required>
                        <span id="err-reg" class="fs-err-inline"></span>
                        <button class="fs-btn" type="submit">Crear cuenta</button>
                    </form>

                    <a href="{{ url_for('inicio') }}" class="fs-volver">← Volver al inicio</a>
                </div>

            </div>
        </div>
    </div>

    <script>
    // Validación del lado del cliente — el servidor también valida por seguridad

    function mostrarError(idSpan, msg) {
        var el = document.getElementById(idSpan);
        el.textContent = msg;
        el.style.display = 'block';
    }

    function validarLogin(form) {
        var correo = form.querySelector('input[name="correo"]').value;
        var pass   = form.querySelector('input[name="contrasena"]').value;

        // Verificar que el correo tenga exactamente un @ y un punto después
        var partes = correo.split('@');
        if (partes.length !== 2 || !partes[1].includes('.')) {
            mostrarError('err-login', 'El correo no tiene un formato válido');
            return false;
        }
        if (pass.length < 8) {
            mostrarError('err-login', 'La contraseña debe tener al menos 8 caracteres');
            return false;
        }
        return true;
    }

    function validarRegistro(form) {
        var nombre = form.querySelector('input[name="nombre"]').value.trim();
        var correo = form.querySelector('input[name="correo"]').value;
        var pass   = form.querySelector('input[name="contrasena"]').value;

        if (!nombre) {
            mostrarError('err-reg', 'Ingresa tu nombre');
            return false;
        }
        var partes = correo.split('@');
        if (partes.length !== 2 || !partes[1].includes('.')) {
            mostrarError('err-reg', 'El correo no tiene un formato válido');
            return false;
        }
        if (pass.length < 8) {
            mostrarError('err-reg', 'La contraseña debe tener al menos 8 caracteres');
            return false;
        }
        return true;
    }
    </script>

</body>
</html>
